services:
  portainer:
    image: portainer/portainer-ee:2.27.7
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
    environment:
      - BASE_URL=/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy

volumes:
  portainer_data:

networks:
  proxy:
    external: true
