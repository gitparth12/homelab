services:
  cloudflare-ddns:
    image: timothyjmiller/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    security_opt:
      - no-new-privileges:true
    network_mode: "host"
    environment:
      PUID: 1000
      PGID: 1000
      ENV_SUBSTITUTION: "true"
    env_file:
      - .env
    volumes:
      - ./config.json:/config.json
    restart: unless-stopped
