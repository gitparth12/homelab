services:
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: pterodactyl_panel
    restart: always
    expose:
      - "80"
    environment:
      APP_URL: "https://${PANEL_DOMAIN}"
      APP_TIMEZONE: ${TZ}
      APP_SERVICE_AUTHOR: ${SERVICE_AUTHOR}
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_DRIVER: redis
      REDIS_HOST: ${REDIS_HOST}
    volumes:
      - ./var:/app/var
      - ./logs:/app/storage/logs
    depends_on:
      - database
      - redis
    networks:
      - pteronet

  wings:
    image: ghcr.io/pterodactyl/wings:latest
    container_name: wings
    restart: unless-stopped
    volumes:
      - /etc/pterodactyl/config.yml:/etc/pterodactyl/config.yml
      - /var/lib/pterodactyl/volumes:/var/lib/pterodactyl/volumes
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/pterodactyl:/tmp/pterodactyl
      - /etc/ssl/certs:/etc/ssl/certs:ro
    expose:
      - "8880"
    ports:
      - "2022:2022" # expose SFTP to the host
      # Manually mapped Minecraft server ports:
      # - "25565:25565"
      # - "25566:25566"
      # - "25567:25567"
      # - "25568:25568" # extra if needed
    networks:
      - pteronet
    environment:
      TZ: "Australia/Sydney"

  database:
    image: mariadb:10.5
    container_name: pterodactyl_db
    restart: always
    environment:
      MYSQL_DATABASE: panel
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./database:/var/lib/mysql
    networks:
      - pteronet

  redis:
    image: redis:alpine
    container_name: pterodactyl_redis
    restart: always
    networks:
      - pteronet

networks:
  pteronet:
    external: true
